# Supabase project configuration for Gunimi
# Reference: https://supabase.com/docs/reference/cli/config
#
# This config is used by the Supabase CLI for local development and migrations.
# Production configuration lives in the Supabase dashboard.

project_id = "gunimi"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000",
  "https://gunimi.com"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refreshtoken_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
min_password_length = 8

[auth.sms]
enable_signup = false

# Google OAuth — scopes are for app sign-in, separate from calendar/gmail
[auth.external.google]
enabled = false
client_id = "env(GOOGLE_AUTH_CLIENT_ID)"
secret = "env(GOOGLE_AUTH_CLIENT_SECRET)"
redirect_uri = ""
url = ""

# Microsoft OAuth — enable when Azure AD app is registered
[auth.external.azure]
enabled = false
client_id = "env(AZURE_CLIENT_ID)"
secret = "env(AZURE_CLIENT_SECRET)"
redirect_uri = ""
url = ""

[edge_runtime]
enabled = true
policy = "oneshot"

[analytics]
enabled = false
